<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wings and Wonder - Elayna Studio</title>

<link rel="icon" href="svg/butterfly.svg">

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f3f3f3;
    font-family: Arial, sans-serif;
    color: #1f1f1f;
}

/* ===== LAYOUT ===== */

.wrapper {
    display: flex;
}

/* ===== SIDEBAR ===== */

.sidebar {
    width: 90px;
    background: #ffffff;
    height: 100vh;
    position: fixed;
    left: 0;
    top: 0;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 20px;
    z-index: 10;
}

.sidebar img {
    width: 44px;
    margin: 12px 0;
    cursor: pointer;
    transition: 0.2s;
}

.sidebar img:hover {
    transform: scale(1.1);
}

/* ===== MAIN ===== */

.main {
    margin-left: 90px;
    width: calc(100% - 90px);
}

/* ===== HEADER ===== */

.header {
    width: 100%;
    padding: 25px 10px 10px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.header img {
    max-width: 420px;
    width: 90%;
    height: auto;
}

/* ===== CONTENT ===== */

.container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 20px;
}

/* ===== INSPIRED BOX ===== */

.inspired-box {
    margin-top: 10px;
    padding: 20px 24px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    text-align: center;
    font-size: 18px;
    line-height: 1.6;
}

.inspired-box span {
    display: block;
    margin-top: 8px;
    font-size: 14px;
    color: #777;
}

/* ===== MOSAIC GRID ===== */

.mosaic {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px;
}

.mosaic-item {
    background: #fff;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    transition: 0.25s;
    cursor: pointer;
}

.mosaic-item:hover {
    transform: translateY(-4px) scale(1.02);
}

.mosaic-item img {
    width: 100%;
    display: block;
}

/* ===== MOBILE ===== */

@media (max-width: 600px) {
    .sidebar {
        width: 70px;
    }

    .main {
        margin-left: 70px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar">
        <img src="icons/home.png" alt="Home">
        <img src="icons/art.png" alt="Art">
        <img src="icons/shop.png" alt="Shop">
        <img src="icons/about.png" alt="About">
    </div>

    <!-- ===== MAIN ===== -->
    <div class="main">

        <!-- HEADER (LOGO ONLY) -->
        <div class="header">
            <img src="images/elaynastudiotext.png" alt="Elayna Studio">
        </div>

        <div class="container">

            <!-- MOVED TEXT -->
            <div class="inspired-box">
                Inspired by imagination, color, and a little bit of magic.
                <span>Handmade creations by Elayna</span>
            </div>

            <!-- MOSAIC / CONTENT -->
            <div class="mosaic">

                <!-- SAMPLE ITEMS (replace with your system later) -->
                <div class="mosaic-item">
                    <img src="images/product_01.webp">
                </div>

                <div class="mosaic-item">
                    <img src="images/product_02.webp">
                </div>

                <div class="mosaic-item">
                    <img src="images/product_03.webp">
                </div>

                <div class="mosaic-item">
                    <img src="images/product_04.webp">
                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
