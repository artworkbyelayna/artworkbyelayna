<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwilight Mosaic</title>

<style>
:root {
  --brand-teal: #00f0d0;
  --bg: #0a0a0a;
}

body {
  margin: 0;
  background: var(--bg);
  font-family: Arial, sans-serif;
  color: white;
  display: flex;
}

/* LEFT MENU */
.sidebar {
  width: 80px;
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0;
  gap: 15px;
}

.icon {
  cursor: pointer;
}

.icon svg {
  width: 28px;
  height: 28px;
  stroke: white;
  transition: all 0.2s ease;
}

.icon:hover svg {
  stroke: var(--brand-teal);
  filter: drop-shadow(0 0 6px var(--brand-teal));
}

/* MAIN CONTENT */
.main {
  flex: 1;
  padding: 10px;
}

/* TOP LOGO */
.top-logo {
  width: 120px;
  margin-bottom: 10px;
  filter: drop-shadow(0 0 8px var(--brand-teal));
}

/* MOSAIC */
#mosaic {
  column-count: 3;
  column-gap: 10px;
}

.mosaic-item {
  width: 100%;
  margin-bottom: 10px;
  border-radius: 12px;
  border: 2px solid transparent;
  transition: all 0.25s ease;
}

.mosaic-item:hover {
  border: 2px solid var(--brand-teal);
  box-shadow: 0 0 10px var(--brand-teal);
  transform: scale(1.02);
}

/* MOBILE */
@media (max-width: 768px) {
  #mosaic {
    column-count: 2;
  }
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="icon" onclick="filterByKeyword('purple')">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
      <path d="M12 4v16M4 12h16"/>
    </svg>
  </div>

  <div class="icon" onclick="renderMosaic(allImages)">
    <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5">
      <circle cx="12" cy="12" r="8"/>
    </svg>
  </div>
</div>

<div class="main">
  <img src="e_teal.png" class="top-logo">
  <div id="mosaic"></div>
</div>

<script>
// SAMPLE IMAGE LIST (replace with yours)
const allImages = [
  "image1.jpg",
  "image2.jpg",
  "purple_flower.jpg",
  "mushroom_art.jpg",
  "e_teal.png",
  "e_purple.png",
  "ChatGPT Image Mar 29, 2026, 04 07 13 PM.png"
];

// EXCLUDE LIST
const EXCLUDE_IMAGES = [
  "e_purple.png",
  "e_teal.png",
  "ChatGPT Image Mar 29, 2026, 04 07 13 PM.png"
];

let usedImages = new Set();

function shouldExclude(src) {
  return EXCLUDE_IMAGES.some(name => src.includes(name));
}

function getUniqueImages(images) {
  const unique = [];
  usedImages.clear();

  for (let img of images) {
    if (!shouldExclude(img) && !usedImages.has(img)) {
      usedImages.add(img);
      unique.push(img);
    }
  }

  return unique;
}

function renderMosaic(images) {
  const container = document.getElementById("mosaic");
  container.innerHTML = "";

  const filtered = getUniqueImages(images);

  filtered.forEach(src => {
    const img = document.createElement("img");
    img.src = src;
    img.className = "mosaic-item";
    container.appendChild(img);
  });
}

function filterByKeyword(keyword) {
  const filtered = allImages.filter(img =>
    img.toLowerCase().includes(keyword.toLowerCase()) &&
    !shouldExclude(img)
  );

  renderMosaic(filtered);
}

renderMosaic(allImages);
</script>

</body>
</html>
